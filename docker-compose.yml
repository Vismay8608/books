services:
  postgres:
    image: postgres:17-alpine
    container_name: smart-auction-postgres
    environment:
      POSTGRES_DB: e-sale
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./eauction_portal.sql:/docker-entrypoint-initdb.d/01-eauction_portal.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e-sale -d e-sale -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: smart-auction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data: